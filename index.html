<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兮冉官方网页 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
        }

        .title {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #ff6b9d, #f000ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(255, 107, 157, 0.3);
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #8a2be2;
            background: rgba(255, 255, 255, 0.1);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            text-align: center;
            text-decoration: none;
            display: block;
        }

        .login-btn, .register-btn {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            background-size: 200% 200%;
            animation: gradient 3s ease infinite;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 成功页面样式 */
        .success-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            overflow: hidden;
        }

        .success-page.active {
            display: flex;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .success-content {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 300px;
        }

        .logo-container {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .success-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .success-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            background-size: 200% 200%;
            animation: gradient 3s ease infinite;
        }

        .success-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(106, 17, 203, 0.4);
        }
    </style>
    <!-- 引入particles.js库 -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body>
    <!-- 登录页面 -->
    <div class="login-container">
        <h1 class="title">兮冉官方网页</h1>
        <div class="input-group">
            <input type="text" placeholder="账号" id="username">
        </div>
        <div class="input-group">
            <input type="password" placeholder="密码" id="password">
        </div>
        <div class="btn-group">
            <button class="btn login-btn" onclick="login()">登录</button>
            <button class="btn register-btn" onclick="register()">注册新用户</button>
        </div>
    </div>

    <!-- 登录成功页面 -->
    <div class="success-page" id="successPage">
        <div id="particles-js"></div>
        <div class="success-content">
            <div class="logo-container">
                <img src="/storage/emulated/0/DCIM/Camera/icon.png" alt="Logo" class="logo" id="logoImage">
            </div>
            <div class="success-buttons">
                <button class="success-btn" onclick="window.open('https://www.123865.com/s/xGiBTd-OJXld', '_blank')">兮冉官方网盘</button>
                <button class="success-btn" onclick="openQQGroup()">官方交流群</button>
            </div>
        </div>
    </div>

    <script>
        // 初始化粒子效果
        function initParticles() {
            particlesJS('particles-js', {
                particles: {
                    number: {
                        value: 80,
                        density: {
                            enable: true,
                            value_area: 800
                        }
                    },
                    color: {
                        value: ["#ff6b9d", "#4deeea", "#74ee15", "#ffe700", "#f000ff"]
                    },
                    shape: {
                        type: "circle",
                        stroke: {
                            width: 0,
                            color: "#000000"
                        }
                    },
                    opacity: {
                        value: 0.8,
                        random: true,
                        anim: {
                            enable: true,
                            speed: 1,
                            opacity_min: 0.1,
                            sync: false
                        }
                    },
                    size: {
                        value: 5,
                        random: true,
                        anim: {
                            enable: true,
                            speed: 2,
                            size_min: 0.3,
                            sync: false
                        }
                    },
                    line_linked: {
                        enable: true,
                        distance: 150,
                        color: "#ffffff",
                        opacity: 0.4,
                        width: 1
                    },
                    move: {
                        enable: true,
                        speed: 2,
                        direction: "none",
                        random: true,
                        straight: false,
                        out_mode: "out",
                        bounce: false,
                        attract: {
                            enable: false,
                            rotateX: 600,
                            rotateY: 1200
                        }
                    }
                },
                interactivity: {
                    detect_on: "canvas",
                    events: {
                        onhover: {
                            enable: true,
                            mode: "grab"
                        },
                        onclick: {
                            enable: true,
                            mode: "push"
                        },
                        resize: true
                    },
                    modes: {
                        grab: {
                            distance: 140,
                            line_linked: {
                                opacity: 1
                            }
                        },
                        push: {
                            particles_nb: 4
                        }
                    }
                },
                retina_detect: true
            });
        }

        // 登录函数
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // 这里可以添加实际的登录验证逻辑
            if (username && password) {
                const successPage = document.getElementById('successPage');
                successPage.classList.add('active');
                initParticles();
            } else {
                alert('请输入账号和密码');
            }
        }

        // 注册函数（示例）
        function register() {
            alert('注册功能待实现');
        }

        // 打开QQ群
        function openQQGroup() {
            // 手机端QQ群跳转
            if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                // 移动端使用QQ群链接
                window.location.href = 'mqqapi://card/show_pslcard?src_type=internal&version=1&uin=738212427&card_type=group&source=qrcode';
            } else {
                // PC端提示
                alert('请在手机端打开QQ扫描群二维码或搜索群号：738212427');
            }
        }

        // 处理图片加载失败
        document.getElementById('logoImage').onerror = function() {
            this.style.display = 'none';
            console.log('图片加载失败，请检查路径：/storage/emulated/0/DCIM/Camera/icon.png');
        };

        // 页面加载时初始化
        window.onload = function() {
            // 可以添加其他初始化代码
        };
    </script>
</body>
</html>
