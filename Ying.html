<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>莹の小窝</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        html, body {
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        body {
            background: linear-gradient(135deg, #0a0628 0%, #190a4e 50%, #20106b 100%);
            color: #fff;
            position: relative;
        }
        /* 粒子全屏固定背景 */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
            top: 0;
            left: 0;
        }
        /* 主体上移，底部预留超大空白，彻底不遮挡底部跑马灯 */
        .main-wrap {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10vh;
            padding-bottom: 48vh;
            padding-left: 20px;
            padding-right: 20px;
        }
        /* 圆形头像发光样式 */
        .avatar-box {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.5), 0 0 60px rgba(168, 85, 247, 0.3);
            margin-bottom: 28px;
            transition: all 0.4s ease;
        }
        .avatar-box:hover {
            transform: scale(1.08);
            box-shadow: 0 0 45px rgba(139, 92, 246, 0.7), 0 0 80px rgba(168, 85, 247, 0.4);
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            background: #110a33;
        }
        /* 渐变发光标题 */
        .title-text {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(90deg, #818cf8, #d8b4fe, #f0abfc);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
            margin-bottom: 40px;
            letter-spacing: 6px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: min(90%, 420px);
        }
        /* 80圆角科技按钮 */
        .tech-btn {
            width: 100%;
            padding: 18px 0;
            border-radius: 80px;
            border: none;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            background: linear-gradient(90deg, #4f46e5, #9333ea);
            color: #fff;
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.35);
            text-align: center;
        }
        .tech-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: left 0.6s ease;
        }
        .tech-btn:hover::before {
            left: 100%;
        }
        .tech-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.5);
        }
        /* 底部彩色跑马灯，固定页面最底端 */
        .marquee-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        .marquee-box {
            position: relative;
            padding: 12px 24px;
            border-radius: 12px;
            overflow: hidden;
        }
        .marquee-box::after {
            content: "";
            position: absolute;
            inset: -3px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899, #f59e0b, #10b981, #3b82f6);
            background-size: 400% 400%;
            animation: borderFlow 4s linear infinite;
            z-index: -1;
            border-radius: 14px;
        }
        .marquee-box::before {
            content: "";
            position: absolute;
            inset: 0;
            background: #0a0628;
            border-radius: 10px;
            z-index: -1;
        }
        @keyframes borderFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }
        .footer-text {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(90deg, #38bdf8, #c084fc, #fb7185, #facc15);
            -webkit-background-clip: text;
            color: transparent;
            animation: textColorShift 2s linear infinite;
        }
        @keyframes textColorShift {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.4); }
            100% { filter: brightness(1); }
        }
        /* 移动端自适应 */
        @media screen and (max-width: 640px) {
            .main-wrap {
                padding-top: 8vh;
                padding-bottom: 52vh;
            }
            .avatar-box {
                width: 140px;
                height: 140px;
            }
            .title-text {
                font-size: 34px;
                letter-spacing: 3px;
            }
            .tech-btn {
                padding: 15px 0;
                font-size: 16px;
            }
            .footer-text {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="main-wrap">
        <div class="avatar-box">
            <img class="avatar-img" src="https://q1.qlogo.cn/g?b=qq&nk=180103819&s=640" alt="莹の头像">
        </div>
        <h1 class="title-text">莹の小窝</h1>

        <div class="btn-group">
            <button class="tech-btn" onclick="openQQGroup()">香肠派对聊天群</button>
            <button class="tech-btn" onclick="openQQUser()">联系作者</button>
            <button class="tech-btn" onclick="copyWechat()">自愿赞赏</button>
        </div>
    </div>

    <div class="marquee-container">
        <div class="marquee-box">
            <span class="footer-text">技术支持—兮冉</span>
        </div>
    </div>

    <script>
        // 粒子动画配置
        particlesJS("particles-js", {
            "particles": {
                "number": {
                    "value": 120,
                    "density": {"enable": true, "value_area": 900}
                },
                "color": {"value": ["#818cf8", "#a855f7", "#c084fc", "#60a5fa"]},
                "shape": {"type": "circle"},
                "opacity": {
                    "value": 0.6,
                    "random": true,
                    "anim": {"enable": true, "speed": 1.2, "opacity_min": 0.1, "sync": false}
                },
                "size": {
                    "value": 3.5,
                    "random": true,
                    "anim": {"enable": true, "speed": 2, "size_min": 0.5, "sync": false}
                },
                "line_linked": {
                    "enable": true,
                    "distance": 160,
                    "color": "#8b5cf6",
                    "opacity": 0.25,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 1.6,
                    "direction": "none",
                    "random": true,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false,
                    "attract": {"enable": false, "rotateX": 600, "rotateY": 1200}
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": {"enable": true, "mode": "grab"},
                    "onclick": {"enable": true, "mode": "push"},
                    "resize": true
                },
                "modes": {
                    "grab": {"distance": 220, "line_linked": {"opacity": 0.6}},
                    "push": {"particles_nb": 6}
                }
            },
            "retina_detect": true
        });

        // 全局定时器存储
        let jumpTimer = null;

        // 页面切后台监听：唤起APP成功就销毁定时器，不执行网页跳转
        document.addEventListener('visibilitychange', () => {
            if ((document.hidden || document.webkitHidden) && jumpTimer) {
                clearTimeout(jumpTimer);
                jumpTimer = null;
            }
        });

        // 判断是否手机设备
        function isMobile() {
            return /Android|iPhone|iPad|iPod|Xiaomi|Huawei|OPPO|VIVO/i.test(navigator.userAgent);
        }

        // 1. 打开QQ群 428624469
        function openQQGroup() {
            const groupId = "428624469";
            const webUrl = "https://wpa.qq.com/msgrd?v=3&uin=" + groupId + "&site=qq&menu=yes";
            let scheme = "";
            if (isMobile()) {
                scheme = "mqqapi://card/show_pslcard?src_type=internal&version=1&uin=" + groupId + "&card_type=group";
            } else {
                scheme = "tencent://groupwpa/?groupUin=" + groupId + "&cmd=0";
            }
            window.location.href = scheme;
            // 仅唤起失败时才打开网页会话
            jumpTimer = setTimeout(() => {
                window.open(webUrl, "_blank");
            }, 1200);
        }

        // 2. 打开QQ好友 1359148535（完全独立协议，无混淆）
        function openQQUser() {
            const qqId = "1359148535";
            const webUrl = "https://wpa.qq.com/msgrd?v=3&uin=" + qqId + "&site=qq&menu=yes";
            let scheme = "";
            if (isMobile()) {
                scheme = "mqqapi://card/show_pslcard?src_type=internal&version=1&uin=" + qqId + "&card_type=person";
            } else {
                scheme = "tencent://message/?uin=" + qqId + "&Site=web&Menu=yes";
            }
            window.location.href = scheme;
            // 仅唤起失败时才打开网页会话
            jumpTimer = setTimeout(() => {
                window.open(webUrl, "_blank");
            }, 1200);
        }

        // 3. 复制微信号
        function copyWechat() {
            const wxId = "liangchengyu20100212";
            const tempInput = document.createElement('textarea');
            tempInput.value = wxId;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            alert("微信号已复制：liangchengyu20100212");
        }
    </script>
</body>
</html>
